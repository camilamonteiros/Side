<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const DS = window.SideDesignSystem_d0448e;

const CREAM = '#F5F0E8';
const cream = (a) => `rgba(245,240,232,${a})`;

/* ============ motion helpers ============ */
function useCountUp(target, { duration = 1100, decimals = 0, start = 0, go = true } = {}) {
  const [val, setVal] = useState(start);
  useEffect(() => {
    if (!go) { setVal(target); return; }
    let raf, t0;
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) { setVal(target); return; }
    const tick = (t) => {
      if (!t0) t0 = t;
      const p = Math.min(1, (t - t0) / duration);
      const e = 1 - Math.pow(1 - p, 3);
      setVal(start + (target - start) * e);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, go]);
  return decimals ? val.toFixed(decimals) : Math.round(val);
}

/* live session timer that keeps ticking */
function useLiveTimer(startSec = 9900) {
  const [sec, setSec] = useState(startSec);
  useEffect(() => {
    const id = setInterval(() => setSec((s) => s + 1), 1000);
    return () => clearInterval(id);
  }, []);
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return `${h}:${String(m).padStart(2, '0')}`;
}

/* atoms */
function Eyebrow({ children, color = cream(0.5), style }) {
  return <div style={{ fontFamily: 'var(--font-ui)', fontSize: 10.5, fontWeight: 600, letterSpacing: '0.22em', textTransform: 'uppercase', color, ...style }}>{children}</div>;
}
function Metric({ children, style }) {
  return <span style={{ fontFamily: 'var(--font-data)', fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.04em', ...style }}>{children}</span>;
}

/* drifting mesh aura */
function Aura({ intensity = 0.7, mo = 1 }) {
  const blob = (s, anim) => <div style={{ position: 'absolute', borderRadius: '50%', filter: 'blur(50px)', willChange: 'transform', ...s, animation: anim }} />;
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 0 }}>
      {blob({ top: '-22%', left: '-24%', width: '72%', height: '58%', background: `radial-gradient(circle, rgba(214,189,128,${0.5 * intensity}), rgba(200,169,106,0) 70%)` }, `side-mesh-a ${16 * mo}s var(--ease-in-out) infinite`)}
      {blob({ bottom: '-24%', right: '-26%', width: '84%', height: '64%', background: `radial-gradient(circle, rgba(31,61,54,${1.0 * intensity}), rgba(31,61,54,0) 68%)` }, `side-mesh-b ${21 * mo}s var(--ease-in-out) infinite`)}
      {blob({ top: '28%', right: '-22%', width: '54%', height: '46%', background: `radial-gradient(circle, rgba(110,139,111,${0.46 * intensity}), rgba(110,139,111,0) 72%)` }, `side-mesh-c ${19 * mo}s var(--ease-in-out) infinite`)}
      {blob({ bottom: '-12%', left: '-18%', width: '58%', height: '48%', background: `radial-gradient(circle, rgba(156,124,60,${0.4 * intensity}), rgba(156,124,60,0) 70%)` }, `side-mesh-d ${24 * mo}s var(--ease-in-out) infinite`)}
    </div>
  );
}

/* soft fading panel */
function Panel({ children, style, radius = 20, glow }) {
  return (
    <div style={{
      position: 'relative', padding: '18px 20px', borderRadius: radius, overflow: 'hidden',
      background: 'linear-gradient(rgba(245,240,232,.065), rgba(245,240,232,.02)) padding-box, linear-gradient(155deg, rgba(245,240,232,.22), rgba(245,240,232,.04) 55%, rgba(245,240,232,0)) border-box',
      border: '1px solid transparent',
      boxShadow: glow ? `inset 0 1px 0 ${cream(0.06)}, 0 0 0 1px ${glow}22, 0 14px 40px -18px ${glow}55` : `inset 0 1px 0 ${cream(0.05)}`,
      ...style,
    }}>{children}</div>
  );
}

/* flowing sparkline with draw-on animation */
function Wave({ data, w = 120, h = 34, color = 'var(--gold-500)', go = true }) {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => [(i / (data.length - 1)) * w, h - ((v - min) / (max - min || 1)) * (h - 6) - 3]);
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const [x0, y0] = pts[i - 1], [x1, y1] = pts[i]; const cx = (x0 + x1) / 2;
    d += ` C ${cx} ${y0}, ${cx} ${y1}, ${x1} ${y1}`;
  }
  const ref = useRef(null);
  const [len, setLen] = useState(0);
  useEffect(() => { if (ref.current) setLen(ref.current.getTotalLength()); }, []);
  return (
    <svg width={w} height={h} style={{ display: 'block', overflow: 'visible' }}>
      <path d={`${d} L ${w} ${h} L 0 ${h} Z`} fill={color} opacity="0.1" />
      <path ref={ref} d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"
        strokeDasharray={len || undefined} strokeDashoffset={go ? 0 : len}
        style={{ transition: 'stroke-dashoffset 1.1s var(--ease-out)' }} />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="3.5" fill={color}
        style={{ opacity: go ? 1 : 0, transition: 'opacity .4s .9s var(--ease-out)' }} />
    </svg>
  );
}

/* ============ HERO performance ring ============ */
function HeroRing({ value, emphasis, mo, go }) {
  const size = 168, thick = 13;
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  const shown = useCountUp(value, { duration: 1300, go });
  const pct = (go ? shown : 0) / 100;
  const stops = emphasis === 'performance'
    ? ['#F0E2BE', '#C8A96A', '#9C7C3C']
    : emphasis === 'equilibrio'
      ? ['#8AACA2', '#3A6356', '#1F3D36']
      : ['#E3CF9E', '#C8A96A', '#3A6356'];
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      {/* glow halo */}
      <div style={{ position: 'absolute', inset: -14, borderRadius: '50%', background: `radial-gradient(circle, ${emphasis === 'equilibrio' ? 'rgba(58,99,86,.5)' : 'rgba(200,169,106,.42)'}, transparent 68%)`, filter: 'blur(8px)', animation: `side-ring-glow ${5 * mo}s var(--ease-in-out) infinite` }} />
      <svg width={size} height={size} style={{ position: 'relative', transform: 'rotate(-90deg)' }}>
        <defs>
          <linearGradient id="heroRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor={stops[0]} />
            <stop offset="55%" stopColor={stops[1]} />
            <stop offset="100%" stopColor={stops[2]} />
          </linearGradient>
        </defs>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={cream(0.08)} strokeWidth={thick} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="url(#heroRing)" strokeWidth={thick}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - pct)}
          style={{ transition: 'stroke-dashoffset 1.3s var(--ease-emphatic)' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1 }}>
        <Eyebrow color={cream(0.42)} style={{ fontSize: 9.5 }}>Índice de foco</Eyebrow>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 1 }}>
          <Metric style={{ fontSize: 52, fontWeight: 600, color: CREAM, lineHeight: 1 }}>{shown}</Metric>
          <Metric style={{ fontSize: 20, color: 'var(--gold-500)' }}>%</Metric>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginTop: 3 }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--green-400)', animation: `side-pulse-dot ${2.2 * mo}s var(--ease-in-out) infinite` }} />
          <span style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: cream(0.6) }}>em dia</span>
        </div>
      </div>
    </div>
  );
}

/* ============ breathing orb ============ */
function BreatheOrb({ mo }) {
  const [phase, setPhase] = useState('Inspire');
  useEffect(() => {
    let on = true;
    const id = setInterval(() => { setPhase((p) => (p === 'Inspire' ? 'Expire' : 'Inspire')); }, 4000 * mo);
    return () => { on = false; clearInterval(id); };
  }, [mo]);
  return (
    <div style={{ position: 'relative', width: 92, height: 92, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: 'radial-gradient(circle, rgba(31,61,54,.85), rgba(31,61,54,0) 70%)' }} />
      <div style={{ position: 'absolute', width: 64, height: 64, background: 'var(--grad-dualidade)', borderRadius: '58% 42% 50% 50% / 55% 50% 50% 45%', animation: `side-morph ${8 * mo}s ease-in-out infinite, side-breathe ${8 * mo}s ease-in-out infinite` }} />
      <span style={{ position: 'relative', fontFamily: 'var(--font-ui)', fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#0E1A16' }}>{phase}</span>
    </div>
  );
}

/* ============ plan item ============ */
function PlanItem({ item, onToggle }) {

  return (
    <button onClick={onToggle} style={{
      display: 'flex', alignItems: 'center', gap: 13, padding: '12px 15px', borderRadius: 15, width: '100%',

    }}>
      <span style={{ width: 36, height: 36, flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: 11, background: done ? 'var(--grad-dualidade)' : cream(0.06), transition: 'var(--transition-control)' }}>

        <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13.5, fontWeight: 500, color: CREAM, opacity: done ? 0.55 : 1, textDecoration: done ? 'line-through' : 'none', textDecorationColor: cream(0.3) }}>{title}</div>
        <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: cream(0.42), marginTop: 1 }}>{sub}</div>
      </div>
      <Metric style={{ fontSize: 11.5, color: cream(0.45) }}>{meta}</Metric>
    </button>
  );
}

/* ============ floating dock ============ */
function Dock({ active, onChange }) {
  const items = [
    { id: 'inicio', icon: 'home', label: 'Início' },
    { id: 'ranking', icon: 'trophy', label: 'Ranking' },
    { id: 'mente', icon: 'mente', label: 'Mente' },
    { id: 'perfil', icon: 'user', label: 'Perfil' },
  ];
  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, display: 'flex', justifyContent: 'center', padding: '0 0 18px', zIndex: 8, pointerEvents: 'none' }}>
      <div style={{ pointerEvents: 'auto', display: 'flex', gap: 3, padding: 6, borderRadius: 'var(--radius-pill)', background: 'rgba(10,13,21,.8)', backdropFilter: 'blur(18px)', border: `1px solid ${cream(0.1)}`, boxShadow: '0 18px 50px -12px rgba(0,0,0,.7)' }}>
        {items.map((it) => {
          const on = active === it.id;
          return (
            <button key={it.id} onClick={() => onChange(it.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '9px 15px', borderRadius: 'var(--radius-pill)', border: 'none', cursor: 'pointer', background: on ? 'var(--grad-gold)' : 'transparent', transition: 'var(--transition-control)' }}>
              <Icon name={it.icon} size={19} color={on ? '#0E0E0E' : cream(0.55)} strokeWidth={on ? 2.2 : 1.7} />
              <span style={{ fontFamily: 'var(--font-ui)', fontSize: 8.5, fontWeight: 700, letterSpacing: '0.04em', color: on ? '#0E0E0E' : cream(0.55) }}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ============ dualidade split tile ============ */
function DualTile({ side, emph, children }) {
  const isPerf = side === 'performance';
  const accent = isPerf ? 'var(--gold-500)' : 'var(--green-400)';
  const emphasized = emph === side || emph === 'dual';
  return (
    <div style={{
      flex: emph === side ? 1.18 : 1, position: 'relative', padding: '15px 16px 16px', borderRadius: 18, overflow: 'hidden',
      transition: 'flex .5s var(--ease-emphatic)',
      background: isPerf
        ? 'linear-gradient(160deg, rgba(200,169,106,.14), rgba(200,169,106,.03) 60%)'
        : 'linear-gradient(160deg, rgba(58,99,86,.2), rgba(31,61,54,.04) 60%)',
      border: `1px solid ${emphasized ? (isPerf ? 'rgba(212,185,127,.32)' : 'rgba(90,132,120,.34)') : cream(0.08)}`,
      boxShadow: `inset 0 1px 0 ${cream(0.05)}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 10 }}>
        <Icon name={isPerf ? 'foco' : 'leaf'} size={15} color={accent} strokeWidth={1.8} />
        <Eyebrow color={accent} style={{ fontSize: 9.5 }}>{isPerf ? 'Performance' : 'Equilíbrio'}</Eyebrow>
      </div>
      {children}
    </div>
  );
}

          <span>9:41</span>

                    <Metric style={{ fontSize: 34, fontWeight: 600, color: CREAM, lineHeight: 1 }}>{timer}</Metric>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 7 }}>
                    <span style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--gold-500)', boxShadow: '0 0 8px var(--gold-500)', animation: `side-pulse-dot ${1.8 * mo}s var(--ease-in-out) infinite` }} />
                    <span style={{ fontFamily: 'var(--font-ui)', fontSize: 12, color: cream(0.62) }}>em foco agora</span>
                  </div>
                  <div style={{ display: 'flex', gap: 14, marginTop: 14 }}>
                    <div>
                      <Metric style={{ fontSize: 17, fontWeight: 600, color: CREAM }}>+12%</Metric>
                      <div style={{ fontFamily: 'var(--font-ui)', fontSize: 10, color: cream(0.42) }}>vs. ontem</div>
                    </div>
                    <div style={{ width: 1, background: cream(0.1) }} />
                    <div>
                      <Metric style={{ fontSize: 17, fontWeight: 600, color: CREAM }}>4 / 5</Metric>
                      <div style={{ fontFamily: 'var(--font-ui)', fontSize: 10, color: cream(0.42) }}>blocos</div>
                    </div>
                  </div>
                </div>
              </div>
              <button onClick={() => {}} style={{
                width: '100%', padding: '13px', borderRadius: 'var(--radius-pill)', border: 'none', cursor: 'pointer',
                background: 'var(--grad-gold)', color: '#0E0E0E', fontFamily: 'var(--font-ui)', fontSize: 14, fontWeight: 700,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, position: 'relative', overflow: 'hidden',
                boxShadow: '0 10px 28px -10px rgba(200,169,106,.6)',
              }}>
                <span style={{ position: 'absolute', inset: 0, background: 'linear-gradient(100deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%)', backgroundSize: '200% 100%', animation: `side-sheen ${3.4 * mo}s linear infinite` }} />
                <Icon name="play" size={16} color="#0E0E0E" strokeWidth={2.4} />
                <span style={{ position: 'relative' }}>Continuar estudando</span>
              </button>
            </Panel>
          </div>

          {/* DUALIDADE */}
          <div className="rise" style={{ ...rise(2), marginBottom: 18 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 11 }}>
              <Eyebrow>Os dois lados de hoje</Eyebrow>
              <span style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: cream(0.4) }}>Estudo · Mente</span>
            </div>
            <div style={{ display: 'flex', gap: 11, alignItems: 'stretch' }}>
              <DualTile side="performance" emph={emph}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <Metric style={{ fontSize: 25, fontWeight: 600, color: CREAM }}>12</Metric>
                  <span style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: 'var(--gold-500)' }}>dias</span>
                  <Icon name="flame" size={15} color="var(--gold-500)" style={{ marginLeft: 2, animation: `side-flame ${2.6 * mo}s var(--ease-in-out) infinite`, transformOrigin: 'bottom center' }} />
                </div>
                <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: cream(0.45), marginTop: 1 }}>sequência de foco</div>
                <div style={{ marginTop: 10 }}><Wave data={[2,3,4,3,5,6,8]} w={130} h={32} color="var(--gold-500)" go={go} /></div>
              </DualTile>
              <DualTile side="equilibrio" emph={emph}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <Metric style={{ fontSize: 25, fontWeight: 600, color: CREAM }}>85</Metric>
                  <span style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: 'var(--green-300)' }}>/100</span>
                </div>
                <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: cream(0.45), marginTop: 1 }}>índice de bem-estar</div>
                <div style={{ marginTop: 10 }}><Wave data={[5,4,5,6,5,6,7]} w={130} h={32} color="var(--green-400)" go={go} /></div>
              </DualTile>
            </div>
          </div>

          {/* MENTE band */}
          <div className="rise" style={{ ...rise(3), marginBottom: 18 }}>
            <Panel radius={22} style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <BreatheOrb mo={mo} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <Eyebrow color="var(--green-300)">O outro lado</Eyebrow>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 17, color: CREAM, marginTop: 4, letterSpacing: '-0.01em' }}>Respire antes do próximo bloco</div>
                <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11.5, color: cream(0.5), marginTop: 3 }}>Você está em dia. 8 min para clarear a mente.</div>
              </div>
              <button style={{ flexShrink: 0, width: 40, height: 40, borderRadius: '50%', border: `1px solid ${cream(0.18)}`, background: cream(0.06), cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="play" size={16} color={CREAM} strokeWidth={2} />
              </button>
            </Panel>
          </div>

          {/* PLANO */}
          <div className="rise" style={{ ...rise(4) }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 5 }}>
              <Eyebrow>Plano de hoje</Eyebrow>
              <Metric style={{ fontSize: 12, color: 'var(--gold-500)' }}>{doneCount}/{plan.length}</Metric>
            </div>
            {/* progress bar */}
            <div style={{ height: 5, borderRadius: 99, background: cream(0.08), overflow: 'hidden', marginBottom: 14 }}>
              <div style={{ height: '100%', width: `${(doneCount / plan.length) * 100}%`, borderRadius: 99, background: 'var(--grad-dualidade)', backgroundSize: '40px 100%', transition: 'width .5s var(--ease-emphatic)', animation: `side-bar-flow ${2 * mo}s linear infinite` }} />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {plan.map((p) => <PlanItem key={p.id} item={p} onToggle={() => toggle(p.id)} />)}
            </div>
            <div style={{ textAlign: 'center', marginTop: 18, fontFamily: 'var(--font-ui)', fontSize: 9.5, letterSpacing: '0.24em', textTransform: 'uppercase', color: cream(0.32) }}>Estudo · Mente · Método</div>
          </div>
        </div>

        <Dock active={tab} onChange={setTab} />
      </div>

      <TweaksPanel>
        <TweakSection label="Aluno" />
        <TweakText label="Nome" value={t.nome} onChange={(v) => setTweak('nome', v)} />
        <TweakSection label="Movimento" />
        <TweakRadio label="Ritmo" value={t.movimento} options={['calmo', 'equilibrado', 'vivo']} onChange={(v) => setTweak('movimento', v)} />
        <TweakSection label="Hierarquia" />
        <TweakRadio label="Ênfase" value={t.enfase} options={['performance', 'dual', 'equilibrio']} onChange={(v) => setTweak('enfase', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
