<script type="text/babel">
const { useState, useEffect, useRef } = React;
const DS = window.SideDesignSystem_d0448e;
const { Logo, Icon, Avatar } = DS;

/* ---------- motion helpers ---------- */
function useCountUp(target, { duration = 1200, decimals = 0, go = true } = {}) {
  const [v, setV] = useState(0);
  useEffect(() => {
    if (!go) return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) { setV(target); return; }
    let raf, t0;
    const tick = (t) => { if (!t0) t0 = t; const p = Math.min(1, (t - t0) / duration); setV(target * (1 - Math.pow(1 - p, 3))); if (p < 1) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, go]);
  return decimals ? v.toFixed(decimals) : Math.round(v);
}
function useTimer(start) {
  const [s, setS] = useState(start);
  useEffect(() => { const id = setInterval(() => setS((x) => x + 1), 1000); return () => clearInterval(id); }, []);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

/* ---------- atoms ---------- */
function Eyebrow({ children, color, style }) {
  return <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, fontWeight: 600, letterSpacing: '0.2em', textTransform: 'uppercase', color: color || 'var(--text-subtle)', ...style }}>{children}</div>;
}
function Metric({ children, style }) {
  return <span style={{ fontFamily: 'var(--font-data)', fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.04em', ...style }}>{children}</span>;
}
function Card({ children, style, className = '', pad = 26, radius = 22 }) {
  return <div className={className} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: radius, padding: pad, boxShadow: 'var(--shadow-sm)', ...style }}>{children}</div>;
}

/* drifting aura (used inside the dark hero) */
function Aura({ mo }) {
  const blob = (s, anim) => <div style={{ position: 'absolute', borderRadius: '50%', filter: 'blur(56px)', willChange: 'transform', ...s, animation: anim }} />;
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 0 }}>
      {blob({ top: '-50%', left: '-8%', width: '50%', height: '180%', background: 'radial-gradient(circle, rgba(200,169,106,.4), rgba(200,169,106,0) 70%)' }, `side-mesh-a ${17 * mo}s var(--ease-in-out) infinite`)}
      {blob({ top: '-40%', right: '8%', width: '54%', height: '180%', background: 'radial-gradient(circle, rgba(31,61,54,.95), rgba(31,61,54,0) 68%)' }, `side-mesh-b ${22 * mo}s var(--ease-in-out) infinite`)}
      {blob({ bottom: '-60%', left: '34%', width: '46%', height: '170%', background: 'radial-gradient(circle, rgba(110,139,111,.5), rgba(110,139,111,0) 72%)' }, `side-mesh-c ${20 * mo}s var(--ease-in-out) infinite`)}
    </div>
  );
}

/* ---------- hero performance ring ---------- */
function HeroRing({ value, emphasis, mo, go }) {
  const size = 184, thick = 13, r = (size - thick) / 2, c = 2 * Math.PI * r;
  const shown = useCountUp(value, { duration: 1400, go });
  const pct = (go ? shown : 0) / 100;
  const stops = emphasis === 'performance' ? ['#F0E2BE', '#C8A96A', '#9C7C3C']
    : emphasis === 'equilibrio' ? ['#8AACA2', '#3A6356', '#1F3D36']
    : ['#E3CF9E', '#C8A96A', '#3A6356'];
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <div style={{ position: 'absolute', inset: -10, borderRadius: '50%', background: `radial-gradient(circle, ${emphasis === 'equilibrio' ? 'rgba(58,99,86,.45)' : 'rgba(200,169,106,.4)'}, transparent 66%)`, filter: 'blur(6px)', animation: `side-glow ${5 * mo}s var(--ease-in-out) infinite` }} />
      <svg width={size} height={size} style={{ position: 'relative', transform: 'rotate(-90deg)' }}>
        <defs>
          <linearGradient id="hRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor={stops[0]} /><stop offset="55%" stopColor={stops[1]} /><stop offset="100%" stopColor={stops[2]} />
          </linearGradient>
        </defs>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(245,240,232,.08)" strokeWidth={thick} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="url(#hRing)" strokeWidth={thick} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - pct)} style={{ transition: 'stroke-dashoffset 1.4s var(--ease-emphatic)' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
        <Eyebrow color="rgba(245,240,232,.42)" style={{ fontSize: 9.5 }}>Desempenho</Eyebrow>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 1 }}>
          <Metric style={{ fontSize: 56, fontWeight: 600, color: '#F5F0E8', lineHeight: 1 }}>{shown}</Metric>
          <Metric style={{ fontSize: 22, color: 'var(--gold-500)' }}>%</Metric>
        </div>
        <span style={{ marginTop: 5, padding: '3px 10px', borderRadius: 99, background: 'rgba(245,240,232,.08)', fontFamily: 'var(--font-data)', fontSize: 11, color: 'rgba(245,240,232,.7)' }}>4.820 pts</span>
      </div>
    </div>
  );
}

/* ---------- breathing orb ---------- */
function BreatheOrb({ mo, big }) {
  const [phase, setPhase] = useState('Inspire');
  useEffect(() => { const id = setInterval(() => setPhase((p) => p === 'Inspire' ? 'Expire' : 'Inspire'), 4000 * mo); return () => clearInterval(id); }, [mo]);
  const sz = big ? 120 : 92;
  return (
    <div style={{ position: 'relative', width: sz, height: sz, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: 'radial-gradient(circle, rgba(58,99,86,.4), rgba(58,99,86,0) 70%)' }} />
      <div style={{ position: 'absolute', width: sz * 0.72, height: sz * 0.72, background: 'var(--grad-dualidade)', borderRadius: '58% 42% 50% 50% / 55% 50% 50% 45%', animation: `side-morph ${8 * mo}s ease-in-out infinite, side-breathe ${8 * mo}s ease-in-out infinite` }} />
      <span style={{ position: 'relative', fontFamily: 'var(--font-ui)', fontSize: big ? 12 : 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#0E1A16' }}>{phase}</span>
    </div>
  );
}

/* ---------- sidebar ---------- */
function Sidebar({ active, onNav, dark, nome }) {

    ['questoes', 'book-open', 'Questões'],

              fontFamily: 'var(--font-ui)', fontSize: 14, fontWeight: on ? 600 : 500, color: on ? 'var(--text)' : 'var(--text-muted)',

              <Icon name={ic} size={19} color={on ? 'var(--accent)' : 'var(--text-subtle)'} strokeWidth={1.8} />

      <Card pad={16} radius={16} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
          <Avatar name={nome + ' Andrade'} tone="gold" size={40} />
          <div style={{ minWidth: 0 }}>
            <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13.5, fontWeight: 600, color: 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{nome} Andrade</div>
            <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11.5, color: 'var(--text-subtle)' }}>3º ano · Medicina</div>
          </div>
        </div>
        <button className="qbtn" style={{ padding: '8px', borderRadius: 9, border: '1px solid var(--border)', background: 'var(--surface-2)', cursor: 'pointer', fontFamily: 'var(--font-ui)', fontSize: 12.5, fontWeight: 500, color: 'var(--text-muted)' }}>Ver meu progresso</button>
      </Card>

}

/* ---------- stat card ---------- */
function StatCard({ icon, label, value, unit, sub, accent, soft, progress = 64, go, delay }) {
  return (
    <Card className="rise lift" pad={22} style={{ animationDelay: `${delay}s`, display: 'flex', flexDirection: 'column', gap: 16, minHeight: 158 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
        <Eyebrow>{label}</Eyebrow>
        <span style={{ width: 38, height: 38, borderRadius: 11, background: soft, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={icon} size={19} color={accent} strokeWidth={1.8} /></span>
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 'auto' }}>

      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div style={{ height: 5, borderRadius: 99, background: 'var(--surface-inset)', overflow: 'hidden' }}>
          <div style={{ height: '100%', width: go ? `${progress}%` : '0%', borderRadius: 99, background: accent, transition: 'width 1.1s var(--ease-emphatic)' }} />
        </div>
        <div style={{ fontFamily: 'var(--font-ui)', fontSize: 12, color: 'var(--text-subtle)' }}>{sub}</div>
      </div>
    </Card>
  );
}

/* ---------- focus block ---------- */
function Chip({ children, accent }) {
  return <span style={{ padding: '4px 11px', borderRadius: 99, fontFamily: 'var(--font-ui)', fontSize: 11.5, fontWeight: 600, color: accent || 'var(--text-muted)', background: accent ? 'color-mix(in srgb, ' + accent + ' 16%, transparent)' : 'var(--surface-2)' }}>{children}</span>;
}
function FocusBlock({ b, onToggle }) {
  return (
    <div className="lift" style={{ position: 'relative', borderRadius: 16, padding: '18px 20px', border: '1px solid var(--border)', background: b.active ? 'linear-gradient(150deg, rgba(58,99,86,.14), transparent 70%)' : 'var(--surface-2)', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', left: 0, top: 14, bottom: 14, width: 3, borderRadius: 99, background: b.done ? 'var(--green-400)' : b.active ? 'var(--grad-gold)' : 'var(--border-strong)' }} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 12 }}>
        <Chip accent="var(--gold-600)">{b.subject}</Chip>
        <Chip>{b.kind}</Chip>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontFamily: 'var(--font-data)', fontSize: 12, color: 'var(--text-subtle)' }}><Icon name="clock" size={13} color="var(--text-subtle)" />{b.time}</span>
        {b.active && <span style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 11px', borderRadius: 99, background: 'rgba(58,99,86,.18)', fontFamily: 'var(--font-ui)', fontSize: 11.5, fontWeight: 600, color: 'var(--green-400)' }}><span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--green-400)', animation: 'side-pulse-dot 1.8s var(--ease-in-out) infinite' }} />Em andamento</span>}
        {b.done && <span style={{ marginLeft: 'auto', fontFamily: 'var(--font-ui)', fontSize: 12, fontWeight: 600, color: 'var(--green-400)', display: 'inline-flex', alignItems: 'center', gap: 5 }}><Icon name="check-circle" size={15} color="var(--green-400)" />Concluído</span>}
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 18, color: 'var(--text)', letterSpacing: '-0.01em' }}>{b.title}</div>
          <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: 'var(--text-muted)', marginTop: 3 }}>{b.desc}</div>
        </div>
        <button onClick={onToggle} className="qbtn" style={{ flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 7, padding: '10px 18px', borderRadius: 99, border: 'none', cursor: 'pointer', fontFamily: 'var(--font-ui)', fontSize: 13.5, fontWeight: 600,
          background: b.done ? 'var(--surface)' : 'var(--grad-gold)', color: b.done ? 'var(--text-muted)' : '#0E0E0E', boxShadow: b.done ? 'inset 0 0 0 1px var(--border)' : 'none' }}>
          {b.done ? 'Refazer' : <><Icon name="play" size={14} color="#0E0E0E" strokeWidth={2.4} />{b.active ? 'Continuar' : 'Iniciar'}</>}
        </button>
      </div>
    </div>

}

/* ---------- agenda row ---------- */
function AgendaRow({ a }) {

/* ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "nome": "Camila",
  "tema": "dark",
  "movimento": "equilibrado",
  "enfase": "dual"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState('inicio');
  const [go, setGo] = useState(false);
  useEffect(() => { const id = requestAnimationFrame(() => setGo(true)); return () => cancelAnimationFrame(id); }, []);

  const dark = t.tema !== 'claro';
  const mo = t.movimento === 'calmo' ? 1.5 : t.movimento === 'vivo' ? 0.62 : 1;
  const emph = t.enfase;
  const timer = useTimer(84 * 60 + 12);
  const acertos = useCountUp(72, { go });
  const bem = useCountUp(85, { go });

  const [blocks, setBlocks] = useState([
    { id: 1, subject: 'Matemática', kind: 'Questões', time: '40 min', title: 'Funções quadráticas', desc: '12 questões escolhidas a partir dos seus erros.', active: true, done: false },
    { id: 2, subject: 'Mente', kind: 'Respiro', time: '8 min', title: 'Respiro guiado', desc: 'Prepare o foco antes do próximo bloco.', done: false },
    { id: 3, subject: 'Física', kind: 'Revisão', time: '35 min', title: 'Soluções — Físico-química', desc: 'Revisão espaçada do conteúdo da semana.', done: false },
    { id: 4, subject: 'Redação', kind: 'Produção', time: '35 min', title: 'Argumentação', desc: 'Estruture uma dissertação completa.', done: false },
  ]);
  const done = blocks.filter((b) => b.done).length;
  const total = 5;
  const toggle = (id) => setBlocks((bs) => bs.map((b) => b.id === id ? { ...b, done: !b.done, active: false } : b));

  const agenda = [
    { icon: 'estudo', title: 'Escola', tag: 'Aulas presenciais', time: '07h–12h', color: 'var(--info)' },
    { icon: 'foco', title: 'Bloco de foco', tag: 'Matemática · Física', time: '14h–16h', color: 'var(--gold-600)' },
    { icon: 'equilibrio', title: 'Academia', tag: 'Corpo & mente', time: '18h–19h', color: 'var(--green-500)' },
  ];
  const shortcuts = [
    { icon: 'clock', title: 'Cronômetro de foco', sub: 'Sessão Pomodoro guiada', color: 'var(--gold-600)' },
    { icon: 'mente', title: 'Respiro de 8 min', sub: 'Pausa para a saúde mental', color: 'var(--green-500)' },
    { icon: 'trending-up', title: 'Revisão inteligente', sub: 'Reforce seus pontos fracos', color: 'var(--info)' },
  ];

  const goldSoft = 'rgba(200,169,106,.15)', greenSoft = 'rgba(58,99,86,.16)', blueSoft = 'rgba(63,90,120,.16)';

  return (
    <div data-theme={dark ? 'dark' : 'light'} style={{ display: 'flex', minHeight: '100vh', background: 'var(--bg)', color: 'var(--text)' }}>
      <Sidebar active={active} onNav={setActive} dark={dark} nome={t.nome} />

      <main style={{ flex: 1, minWidth: 0, display: 'flex', justifyContent: 'center' }}>
        <div style={{ width: '100%', maxWidth: 1240, padding: '34px 48px 64px' }}>

          {/* topbar */}
          <div className="rise" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24, marginBottom: 30 }}>
            <div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 26, color: 'var(--text)', letterSpacing: '-0.02em' }}>Bom estudo, {t.nome}</div>
              <div style={{ fontFamily: 'var(--font-ui)', fontSize: 14, color: 'var(--text-muted)', marginTop: 4 }}>Sua alta performance começa com equilíbrio.</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '10px 16px', borderRadius: 99, background: 'var(--surface)', border: '1px solid var(--border)', minWidth: 240 }}>
                <Icon name="search" size={17} color="var(--text-subtle)" />
                <input placeholder="Buscar matéria, questão…" style={{ border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--font-ui)', fontSize: 13.5, color: 'var(--text)', width: '100%' }} />
              </div>
              <button className="qbtn" style={{ position: 'relative', width: 42, height: 42, borderRadius: 12, background: 'var(--surface)', border: '1px solid var(--border)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="bell" size={18} color="var(--text-muted)" />
                <span style={{ position: 'absolute', top: 9, right: 11, width: 7, height: 7, borderRadius: '50%', background: 'var(--gold-600)', border: '2px solid var(--surface)' }} />
              </button>
              <button className="qbtn" onClick={() => setTweak('tema', dark ? 'claro' : 'dark')} title="Alternar tema" style={{ width: 42, height: 42, borderRadius: 12, background: 'var(--surface)', border: '1px solid var(--border)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={dark ? 'sun' : 'descanso'} size={18} color="var(--accent)" />
              </button>
            </div>
          </div>

          {/* HERO */}
          <div className="rise" style={{ animationDelay: '.05s', position: 'relative', overflow: 'hidden', borderRadius: 28, padding: '34px 40px', marginBottom: 26, background: 'linear-gradient(120deg, #0C1A17 0%, #0A1119 60%, #0A0E16 100%)', boxShadow: '0 24px 60px -28px rgba(0,0,0,.7)' }}>
            <Aura mo={mo} />
            <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 36, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 280 }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '6px 14px', borderRadius: 99, background: 'rgba(245,240,232,.08)', border: '1px solid rgba(245,240,232,.12)', fontFamily: 'var(--font-ui)', fontSize: 12.5, fontWeight: 600, color: '#F5F0E8' }}>
                  <Icon name="flame" size={14} color="var(--gold-500)" style={{ animation: `side-flame ${2.6 * mo}s var(--ease-in-out) infinite`, transformOrigin: 'bottom center' }} />12 dias de constância
                </span>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 38, color: '#F5F0E8', letterSpacing: '-0.025em', marginTop: 16, lineHeight: 1.05 }}>Olá, {t.nome}</div>
                <div style={{ fontFamily: 'var(--font-ui)', fontSize: 15, color: 'rgba(245,240,232,.62)', marginTop: 10, maxWidth: 420 }}>Foco e saúde mental caminham juntos. Você está em dia — pronta para o próximo bloco?</div>
                <div style={{ display: 'flex', gap: 12, marginTop: 24, flexWrap: 'wrap' }}>
                  <button className="qbtn" style={{ position: 'relative', overflow: 'hidden', display: 'inline-flex', alignItems: 'center', gap: 9, padding: '13px 22px', borderRadius: 99, border: 'none', cursor: 'pointer', background: 'var(--grad-gold)', color: '#0E0E0E', fontFamily: 'var(--font-ui)', fontSize: 14.5, fontWeight: 700, boxShadow: '0 12px 30px -10px rgba(200,169,106,.55)' }}>
                    <span style={{ position: 'absolute', inset: 0, background: 'linear-gradient(100deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%)', backgroundSize: '200% 100%', animation: `side-sheen ${3.6 * mo}s linear infinite` }} />
                    <Icon name="target" size={17} color="#0E0E0E" strokeWidth={2.2} /><span style={{ position: 'relative' }}>Iniciar foco agora</span>
                  </button>
                  <button className="qbtn" style={{ display: 'inline-flex', alignItems: 'center', gap: 9, padding: '13px 22px', borderRadius: 99, cursor: 'pointer', background: 'rgba(245,240,232,.06)', border: '1px solid rgba(245,240,232,.2)', color: '#F5F0E8', fontFamily: 'var(--font-ui)', fontSize: 14.5, fontWeight: 600 }}>
                    <Icon name="progresso" size={17} color="#F5F0E8" strokeWidth={2} />Ver meu plano
                  </button>
                </div>
              </div>
              <HeroRing value={87} emphasis={emph} mo={mo} go={go} />
            </div>
          </div>

          {/* MID: plano (destaque) + coluna direita */}
          <div style={{ display: 'grid', gridTemplateColumns: '2.1fr 1fr', gap: 24, marginBottom: 24, alignItems: 'stretch' }}>
            <Card className="rise" pad={0} radius={24} style={{ animationDelay: '.2s', position: 'relative', overflow: 'hidden', border: '1px solid var(--gold-700)', boxShadow: 'var(--shadow-md)' }}>
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: 'var(--grad-gold)' }} />
              <div style={{ padding: '30px 30px 30px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                    <span style={{ width: 46, height: 46, borderRadius: 13, background: goldSoft, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="target" size={23} color="var(--gold-600)" strokeWidth={1.9} /></span>
                    <div>
                      <Eyebrow color="var(--gold-600)">Sua prioridade agora</Eyebrow>
                      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 25, color: 'var(--text)', letterSpacing: '-0.015em', marginTop: 3 }}>Plano de foco de hoje</div>
                    </div>
                  </div>
                  <span style={{ padding: '7px 14px', borderRadius: 99, background: goldSoft, fontFamily: 'var(--font-ui)', fontSize: 12.5, fontWeight: 600, color: 'var(--gold-600)', whiteSpace: 'nowrap' }}>+120 XP disponíveis</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '18px 0 22px' }}>
                  <div style={{ flex: 1, height: 7, borderRadius: 99, background: 'var(--surface-inset)', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${(done / total) * 100}%`, borderRadius: 99, background: 'var(--grad-dualidade)', backgroundSize: '36px 100%', transition: 'width .5s var(--ease-emphatic)', animation: `side-bar-flow ${2 * mo}s linear infinite` }} />
                  </div>
                  <span style={{ fontFamily: 'var(--font-ui)', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>{done} de {total} blocos · ritmo saudável</span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {blocks.map((b) => <FocusBlock key={b.id} b={b} onToggle={() => toggle(b.id)} />)}
                </div>
              </div>
            </Card>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
              <Card className="rise" pad={26} style={{ animationDelay: '.26s', display: 'flex', flexDirection: 'column', gap: 20, background: dark ? 'linear-gradient(165deg, rgba(58,99,86,.18), var(--surface) 55%)' : 'linear-gradient(165deg, rgba(58,99,86,.08), var(--surface) 60%)' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div>
                    <Eyebrow color="var(--green-500)">O outro lado</Eyebrow>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 20, color: 'var(--text)', marginTop: 5, letterSpacing: '-0.01em' }}>Mente & Equilíbrio</div>
                  </div>
                  <Icon name="leaf" size={22} color="var(--green-500)" strokeWidth={1.6} />
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
                  <BreatheOrb mo={mo} big />
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 17, color: 'var(--text)' }}>Respire antes de focar</div>
                    <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>8 min para clarear a mente e elevar seu desempenho.</div>
                    <button className="qbtn" style={{ marginTop: 12, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '10px 18px', borderRadius: 99, border: 'none', cursor: 'pointer', background: 'var(--green-700)', color: '#F5F0E8', fontFamily: 'var(--font-ui)', fontSize: 13.5, fontWeight: 600 }}>
                      <Icon name="play" size={14} color="#F5F0E8" strokeWidth={2.2} />Começar respiro
                    </button>
                  </div>
                </div>
                <div style={{ height: 1, background: 'var(--border)' }} />
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                  {[['descanso', '7h32', 'Sono'], ['equilibrio', 'Estável', 'Humor'], ['mente', '3 hoje', 'Respiros']].map(([ic, val, lab]) => (
                    <div key={lab} style={{ textAlign: 'center', padding: '14px 6px', borderRadius: 14, background: 'var(--surface-2)', border: '1px solid var(--border)' }}>
                      <Icon name={ic} size={18} color="var(--green-500)" strokeWidth={1.7} />
                      <div style={{ fontFamily: 'var(--font-data)', fontSize: 15, fontWeight: 600, color: 'var(--text)', marginTop: 7 }}>{val}</div>
                      <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, color: 'var(--text-subtle)', marginTop: 2 }}>{lab}</div>
                    </div>
                  ))}
                </div>
              </Card>

              <Card className="rise" pad={26} style={{ animationDelay: '.32s', flex: 1, display: 'flex', flexDirection: 'column' }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 19, color: 'var(--text)', letterSpacing: '-0.01em', marginBottom: 16 }}>Atalhos rápidos</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 11, flex: 1 }}>
                  {shortcuts.map((s) => <Shortcut key={s.title} s={s} />)}
                </div>
              </Card>
            </div>
          </div>

          {/* BOTTOM: agenda full-width, destaque */}
          <Card className="rise" pad={32} radius={24} style={{ animationDelay: '.36s' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 22 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                <span style={{ width: 46, height: 46, borderRadius: 13, background: blueSoft, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="calendar" size={23} color="var(--info)" strokeWidth={1.9} /></span>
                <div>
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 23, color: 'var(--text)', letterSpacing: '-0.015em' }}>Sua agenda de hoje</div>
                  <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13.5, color: 'var(--text-muted)', marginTop: 3 }}>Segunda · 29 jun · 3 compromissos</div>
                </div>
              </div>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-ui)', fontSize: 13.5, fontWeight: 500, color: 'var(--text-subtle)' }}>Ver semana<Icon name="chevron-right" size={16} color="var(--text-subtle)" /></span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
              {agenda.map((a) => <AgendaRow key={a.title} a={a} />)}
            </div>
          </Card>

          {/* STATS — panorama do dia */}
          <Eyebrow style={{ margin: '36px 2px 14px' }}>Seu panorama de hoje</Eyebrow>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 18 }}>
            <StatCard icon="clock" label="Tempo focado" value="84" unit="min" sub="47% da meta de 180 min" accent="var(--gold-600)" soft={goldSoft} progress={47} go={go} delay={0.1} />
            <StatCard icon="target" label="Acertos do dia" value={acertos + '%'} sub="18 de 25 questões" accent="var(--info)" soft={blueSoft} progress={72} go={go} delay={0.16} />
            <StatCard icon="equilibrio" label="Bem-estar mental" value={bem} unit="/100" sub="Humor estável esta semana" accent="var(--green-500)" soft={greenSoft} progress={85} go={go} delay={0.22} />
            <StatCard icon="flame" label="Sequência" value="12" unit="dias" sub="Nível 14 · 4.820 XP" accent="var(--gold-600)" soft={goldSoft} progress={80} go={go} delay={0.28} />
          </div>

        </div>
      </main>

      <TweaksPanel>
        <TweakSection label="Aluno" />
        <TweakText label="Nome" value={t.nome} onChange={(v) => setTweak('nome', v)} />
        <TweakSection label="Aparência" />
        <TweakRadio label="Tema" value={t.tema} options={['dark', 'claro']} onChange={(v) => setTweak('tema', v)} />
        <TweakSection label="Movimento" />
        <TweakRadio label="Ritmo" value={t.movimento} options={['calmo', 'equilibrado', 'vivo']} onChange={(v) => setTweak('movimento', v)} />
        <TweakSection label="Hierarquia" />
        <TweakRadio label="Ênfase" value={t.enfase} options={['performance', 'dual', 'equilibrio']} onChange={(v) => setTweak('enfase', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
